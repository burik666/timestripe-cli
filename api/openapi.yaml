  /comments/:
    get:
      operationId: comments_list
      parameters:
      - name: created_from
        in: query
        required: false
        description: Inclusive lower bound (>=) on created_datetime. ISO 8601 datetime.
        schema:
          type: string
          format: date-time
      - name: created_to
        in: query
        required: false
        description: Exclusive upper bound (<) on created_datetime. ISO 8601 datetime.
